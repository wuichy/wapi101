<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Iniciar sesión · Wapi101 CRM</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wapi101" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: #2563eb;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -1px;
    }
    .logo-text { font-size: 18px; font-weight: 700; color: #0f172a; }
    h1 { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .btn {
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">R</div>
      <span class="logo-text">Wapi101</span>
    </div>
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa con tu usuario o email y contraseña</p>

    <div class="error" id="loginError"></div>

    <form id="loginForm" autocomplete="on">
      <label for="username">Usuario o email</label>
      <input type="text" id="username" name="username" placeholder="usuario o correo" autocomplete="username" required />

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />

      <div style="display:flex;align-items:center;justify-content:space-between;margin:-4px 0 20px;">
        <label for="rememberMe" id="rememberLabel" style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#374151;margin:0;cursor:pointer;user-select:none;">
          <input type="checkbox" id="rememberMe" name="rememberMe" style="width:15px;height:15px;margin:0;accent-color:#2563eb;cursor:pointer;" checked />
          <span id="rememberText">Recuerda mi sesión</span>
        </label>
        <a href="/forgot-password" id="forgotLink" style="color:#2563eb;text-decoration:none;font-weight:500;font-size:12px;">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn" type="submit" id="loginBtn">Iniciar sesión</button>
    </form>
  </div>

  <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:24px;">
    <a href="/privacy" style="color:#94a3b8;text-decoration:none;margin:0 8px;">Aviso de Privacidad</a>·
    <a href="/terms" style="color:#94a3b8;text-decoration:none;margin:0 8px;">Términos del Servicio</a>
  </p>

  <script>
    // ── Detección de idioma ──────────────────────────────────────────────────
    const _stored = (() => { try { return localStorage.getItem('locale'); } catch { return null; } })();
    const _nav    = (navigator.language || 'es').toLowerCase();
    const _isEn   = _stored ? _stored === 'en' : !_nav.startsWith('es');

    const _L = {
      es: {
        title:       'Iniciar sesión · Wapi101 CRM',
        heading:     'Bienvenido',
        subtitle:    'Ingresa con tu usuario o email y contraseña',
        lblUser:     'Usuario o email',
        phUser:      'usuario o correo',
        lblPass:     'Contraseña',
        rememberMe:  'Recuerda mi sesión',
        forgot:      '¿Olvidaste tu contraseña?',
        btnLogin:    'Iniciar sesión',
        btnLoading:  'Verificando...',
        errGeneric:  'Error al iniciar sesión',
        linkPrivacy: 'Aviso de Privacidad',
        linkTerms:   'Términos del Servicio',
      },
      en: {
        title:       'Sign in · Wapi101 CRM',
        heading:     'Welcome back',
        subtitle:    'Sign in with your username or email and password',
        lblUser:     'Username or email',
        phUser:      'username or email',
        lblPass:     'Password',
        rememberMe:  'Remember me',
        forgot:      'Forgot your password?',
        btnLogin:    'Sign in',
        btnLoading:  'Verifying...',
        errGeneric:  'Failed to sign in',
        linkPrivacy: 'Privacy Policy',
        linkTerms:   'Terms of Service',
      },
    };
    const s = _isEn ? _L.en : _L.es;

    document.getElementById('htmlRoot').lang         = _isEn ? 'en' : 'es';
    document.title                                   = s.title;
    document.querySelector('h1').textContent         = s.heading;
    document.querySelector('.subtitle').textContent  = s.subtitle;
    document.querySelector('label[for="username"]').textContent = s.lblUser;
    document.getElementById('username').placeholder  = s.phUser;
    document.querySelector('label[for="password"]').textContent = s.lblPass;
    document.getElementById('rememberText').textContent = s.rememberMe;
    document.getElementById('forgotLink').textContent = s.forgot;
    document.getElementById('loginBtn').textContent  = s.btnLogin;
    const links = document.querySelectorAll('p a');
    if (links[0]) links[0].textContent = s.linkPrivacy;
    if (links[1]) links[1].textContent = s.linkTerms;

    // ── Submit ───────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      const btn   = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = s.btnLoading;

      try {
        const _remember = document.getElementById('rememberMe').checked;
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            remember: _remember,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || s.errGeneric);
        // "Recuerda mi sesión" → localStorage (persiste entre sesiones de navegador)
        // Sin recordar         → sessionStorage (se borra al cerrar la pestaña/app)
        const _store = _remember ? localStorage : sessionStorage;
        // Limpiar el otro para evitar conflictos
        try { (_remember ? sessionStorage : localStorage).removeItem('rh_token'); } catch {}
        try { (_remember ? sessionStorage : localStorage).removeItem('rh_advisor'); } catch {}
        _store.setItem('rh_token', data.token);
        _store.setItem('rh_advisor', JSON.stringify(data.advisor));
        // Respetar ?redirect= si viene (caso /chat PWA: login → /chat, no /app)
        const _params = new URLSearchParams(location.search);
        const _redirect = _params.get('redirect');
        // Solo permitir paths internos (mismo dominio) por seguridad
        const _safe = _redirect && _redirect.startsWith('/') && !_redirect.startsWith('//');
        window.location.href = _safe ? _redirect : '/app';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = s.btnLogin;
      }
    });
  </script>
</body>
</html>
