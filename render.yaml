services:
  - type: web
    name: reelance-hub
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: reelance-hub-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: KOMMO_SUBDOMAIN
        sync: false
      - key: KOMMO_CLIENT_ID
        sync: false
      - key: KOMMO_CLIENT_SECRET
        sync: false
      - key: KOMMO_REDIRECT_URI
        sync: false
      - key: KOMMO_SALESBOT_ID
        sync: false
      - key: KOMMO_SOURCE_ID
        sync: false
      - key: WC_WEBHOOK_SECRET
        sync: false
      - key: WC_PHONE_PREFIX
        value: "+521"
      - key: KOMMO_PIPELINE_CLIENTES_ID
        sync: false
      - key: KOMMO_STATUS_RECIENTES_ID
        sync: false
      - key: KOMMO_FIELD_LAST_ORDER_DATE
        sync: false
      - key: KOMMO_CLIENTE_TAG
        value: Cliente
      - key: KOMMO_BOTS_TO_STOP_ON_ORDER
        sync: false
